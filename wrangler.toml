name = "sonic-topography"
main = "worker/index.ts"
compatibility_date = "2025-05-01"

# Static SPA assets served from the Vite build output.
# not_found_handling = "single-page-application" makes deep links fall back
# to index.html, which the Worker forwards to via env.ASSETS.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
NETEASE_REFERER = "https://music.163.com/"
NETEASE_USER_AGENT = "Mozilla/5.0"